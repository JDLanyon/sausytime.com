name: Deploy Next.js Developer Portfolio

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies and build
        run: |
          npm ci
          npm run build

      - name: Prepare deployment directory
        run: |
          # Create directory if missing (already exists, but ensure it)
          mkdir -p /var/www/sausytime.com
          # Clean it
          rm -rf /var/www/sausytime.com/*

      - name: Copy application files
        run: |
          # Set umask so new files are group-writable (jdl group)
          umask 002
          cp -r .next /var/www/sausytime.com/
          cp -r public /var/www/sausytime.com/
          cp package.json package-lock.json next.config.js /var/www/sausytime.com/ 2>/dev/null || true

      - name: Install production dependencies
        run: |
          cd /var/www/sausytime.com
          umask 002
          npm ci --omit=dev --no-audit --no-fund

      - name: Restart the systemd service
        run: |
          systemctl restart sausytime.com
          sleep 5
          systemctl status sausytime.com --no-pager

      - name: Verify deployment
        run: |
          curl --fail http://localhost:3000 || exit 1